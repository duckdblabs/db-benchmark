name: Generate Report
on:
  workflow_dispatch:
    inputs:
      instance_id:
        type: string
        default: "i-0e75a4f0e0b61c475"
      publish:
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/master' || github.sha }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  gh_issue_repo: duckdblabs/db-benchmark
  instance_id: ${{ inputs.instance_id }}


jobs:
  start-aws-machine:
    name: Start aws-machine
    runs-on: ubuntu-latest
    environment: aws-secrets
    steps:
      - name: Start EC2 runner
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: aws ec2 start-instances --instance-id ${{ env.instance_id }}

      - name: Create issue if failure
        shell: bash
        if: ${{ failure() && contains(github.ref_name, 'main') }}
        run: |
          gh issue create --repo ${{ env.gh_issue_repo }} --title "Could not start DB-benchmark machine for report generation" --body "AWS box with instance-id ${{ env.instance_id }} could not be started"

  generate-report:
    name: Generate Report
    runs-on: self-hosted
    environment: aws-secrets
    needs: start-aws-machine
    env:
      GENERATE_REPORT: 1
    steps:
      - uses: actions/checkout@v4

      - name: run mount
        shell: bash
        run: |
          ./_setup_utils/mount.sh

      - name: Download data
        shell: bash
        working-directory: /var/lib/mount/db-benchmark-metal
        run: |
          mkdir -p data
          ./_run/download_large.sh
          ./_run/download_small_medium.sh

      - name: Render reports
        shell: bash
        working-directory: /var/lib/mount/db-benchmark-metal
        run: |
          mkdir -p out public
          Rscript -e 'rmarkdown::render("./_report/index.Rmd", output_dir="public")' > ./out/rmarkdown_index.out 2>&1 && echo "# Benchmark index report produced"
          Rscript -e 'rmarkdown::render("./_report/history.Rmd", output_dir="public")' > ./out/rmarkdown_history.out 2>&1 && echo "# Benchmark history report produced"
          Rscript -e 'rmarkdown::render("./_report/tech.Rmd", output_dir="public")' > ./out/rmarkdown_tech.out 2>&1 && echo "# Benchmark tech report produced"

      - name: Publish report
        if: ${{ inputs.publish }}
        shell: bash
        working-directory: /var/lib/mount/db-benchmark-metal
        run: |
          ./_report/publish.sh

      - name: Zip public directory
        if: always()
        shell: bash
        working-directory: /var/lib/mount/db-benchmark-metal
        run: |
          zip -r public.zip public/

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: public.zip
          path: /var/lib/mount/db-benchmark-metal/public.zip
          if-no-files-found: error

  shutdown:
    name: shut down
    environment: aws-secrets
    if: always()
    runs-on: ubuntu-latest
    needs:
      - start-aws-machine
      - generate-report

    steps:
      - name: shutdown
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: aws ec2 stop-instances --instance-id ${{ env.instance_id }}
